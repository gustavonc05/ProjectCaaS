
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Lista de mercado</title>
</head>
<body>
    <header class="app-header">
        <h1>Lista de mercado</h1>
    </header>
    <main class="container">
        <form id="add-form" class="add-form">
            <input type="text" id="item-input" placeholder="Novo Item" required />
            <button type="submit" id="add-btn">Adicionar Item</button>
        </form>
        <p id="empty-msg" class="text-center" style="display:none;">Nenhum item adicionado ainda!</p>
        <div id="items-list"></div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
